<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="260" fill="#0f172a"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#cbd5e1" letter-spacing="0.5">PHPScope — Data Flow</text>

  <!-- PHPScope internal boundary -->
  <rect x="183" y="55" width="635" height="145" fill="#161f2e" stroke="#334155" stroke-width="1.5" rx="8" stroke-dasharray="5,4"/>
  <text x="500" y="215" text-anchor="middle" font-size="11" fill="#475569" letter-spacing="1">PHPScope</text>

  <!-- 1. PHP-FPM / CLI -->
  <rect x="18" y="75" width="140" height="85" fill="#172554" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="88" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd">PHP-FPM</text>
  <text x="88" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd">/ CLI</text>
  <text x="88" y="148" text-anchor="middle" font-size="10" fill="#60a5fa">Running Processes</text>

  <!-- Arrow 1 → 2 with label -->
  <line x1="158" y1="117" x2="194" y2="117" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="176" y="109" text-anchor="middle" font-size="9" fill="#4b5563">ptrace</text>

  <!-- 2. Collector -->
  <rect x="198" y="75" width="130" height="85" fill="#1c1500" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
  <text x="263" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#fcd34d">Collector</text>
  <text x="263" y="123" text-anchor="middle" font-size="11" fill="#fbbf24">(phpspy)</text>
  <text x="263" y="148" text-anchor="middle" font-size="10" fill="#b45309">Captures stack traces</text>

  <!-- Arrow 2 → 3 -->
  <line x1="328" y1="117" x2="353" y2="117" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Processor -->
  <rect x="357" y="75" width="130" height="85" fill="#021309" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="422" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Processor</text>
  <text x="422" y="148" text-anchor="middle" font-size="10" fill="#4ade80">Filter + aggregate</text>

  <!-- Arrow 3 → 4 -->
  <line x1="487" y1="117" x2="512" y2="117" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. Converter -->
  <rect x="516" y="75" width="130" height="85" fill="#180d00" stroke="#f97316" stroke-width="1.5" rx="6"/>
  <text x="581" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#fdba74">Converter</text>
  <text x="581" y="148" text-anchor="middle" font-size="10" fill="#ea580c">→ pprof format</text>

  <!-- Arrow 4 → 5 -->
  <line x1="646" y1="117" x2="671" y2="117" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5. Sender -->
  <rect x="675" y="75" width="130" height="85" fill="#07091f" stroke="#6366f1" stroke-width="1.5" rx="6"/>
  <text x="740" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#a5b4fc">Sender</text>
  <text x="740" y="148" text-anchor="middle" font-size="10" fill="#818cf8">Batch + HTTP push</text>

  <!-- Arrow 5 → 6 with label -->
  <line x1="805" y1="117" x2="841" y2="117" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="823" y="109" text-anchor="middle" font-size="9" fill="#4b5563">pprof</text>

  <!-- 6. Pyroscope -->
  <rect x="845" y="75" width="140" height="85" fill="#200818" stroke="#ec4899" stroke-width="1.5" rx="6"/>
  <text x="915" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#f9a8d4">Pyroscope</text>
  <text x="915" y="148" text-anchor="middle" font-size="10" fill="#f472b6">Visualization + Storage</text>
</svg>
