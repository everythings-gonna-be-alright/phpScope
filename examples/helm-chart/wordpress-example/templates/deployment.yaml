apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordpress-example.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress-example.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wordpress-example.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/phpscope-config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "wordpress-example.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: wordpress
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wordpress-example.serviceAccountName" . }}
      shareProcessNamespace: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: copy-wordpress
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - cp -r /usr/src/wordpress/. /var/www/html/ && chown -R 33:33 /var/www/html/
          securityContext:
            capabilities:
              drop: [ALL]
              add: [CHOWN, FOWNER, DAC_OVERRIDE]
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: wordpress-files
              mountPath: /var/www/html
        {{- if .Values.mysql.enabled }}
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z {{ include "wordpress-example.fullname" . }}-mysql 3306; do echo "waiting for mysql..."; sleep 2; done
          securityContext:
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
        {{- end }}
      containers:
        - name: wordpress
          securityContext:
            {{- toYaml .Values.phpSecurityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if .Values.phpEnv }}
            {{- toYaml .Values.phpEnv | nindent 12 }}
            {{- end }}
            {{- if .Values.mysql.enabled }}
            - name: WORDPRESS_DB_HOST
              value: "{{ include "wordpress-example.fullname" . }}-mysql"
            - name: WORDPRESS_DB_NAME
              value: {{ .Values.mysql.database | quote }}
            - name: WORDPRESS_DB_USER
              value: {{ .Values.mysql.user | quote }}
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-example.fullname" . }}-mysql
                  key: password
            {{- end }}
          ports:
            - name: fpm
              containerPort: 9000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- toYaml .Values.phpVolumeMounts | nindent 12 }}
        - name: nginx
          securityContext:
            {{- toYaml .Values.nginxSecurityContext | nindent 12 }}
          image: {{ .Values.nginx.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          volumeMounts:
            - name: wordpress-files
              mountPath: /var/www/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: nginx-tmp
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /var/run
        - name: phpscope
          securityContext:
            {{- toYaml .Values.phpscope.securityContext | nindent 12 }}
          image: "{{ .Values.phpscope.image.repository }}:{{ .Values.phpscope.image.tag }}"
          imagePullPolicy: {{ .Values.phpscope.image.pullPolicy }}
          args:
            - -pyroscopeUrl
            - $(PHPSCOPE_PYROSCOPE_URL)
            - -appName
            - $(PHPSCOPE_APP_NAME)
            {{- if .Values.phpscope.config.authToken }}
            - -auth
            - $(PHPSCOPE_AUTH_TOKEN)
            {{- end }}
            - -rateHz
            - "{{ .Values.phpscope.config.rateHz }}"
            - -interval
            - "{{ .Values.phpscope.config.interval }}"
            - -batch
            - "{{ .Values.phpscope.config.batchLimit }}"
            {{- if .Values.phpscope.config.excludePattern }}
            - -exclude
            - {{ .Values.phpscope.config.excludePattern | quote }}
            {{- end }}
            - -pgrep
            - {{ .Values.phpscope.config.pgrepPattern | quote }}
            {{- range .Values.phpscope.config.tags }}
            - -tags
            - {{ . | quote }}
            {{- end }}
          env:
            - name: PHPSCOPE_PYROSCOPE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "wordpress-example.fullname" . }}-phpscope
                  key: pyroscopeUrl
            - name: PHPSCOPE_APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "wordpress-example.fullname" . }}-phpscope
                  key: appName
            {{- if .Values.phpscope.config.authToken }}
            - name: PHPSCOPE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-example.fullname" . }}-phpscope
                  key: authToken
            {{- end }}
          resources:
            {{- toYaml .Values.phpscope.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: wordpress-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "wordpress-example.fullname" . }}-nginx
        - name: nginx-tmp
          emptyDir: {}
        - name: tmp
          emptyDir: {}
