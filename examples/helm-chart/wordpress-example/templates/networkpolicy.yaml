{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wordpress-example.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress-example.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wordpress-example.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: wordpress
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx-internal
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: ingress-nginx-internal
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.pyroscope.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pyroscope
      ports:
        - protocol: TCP
          port: {{ .Values.pyroscope.pyroscope.service.port }}
    {{- else }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.pyroscopeNamespace }}
      ports:
        - protocol: TCP
          port: 4040
    {{- end }}
    {{- if .Values.mysql.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "wordpress-example.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: mysql
      ports:
        - protocol: TCP
          port: 3306
    {{- end }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
