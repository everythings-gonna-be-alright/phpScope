{{- if and .Values.mysql.enabled .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wordpress-example.fullname" . }}-mysql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress-example.labels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
spec:
  podSelector:
    matchLabels:
      {{- include "wordpress-example.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mysql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "wordpress-example.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: wordpress
      ports:
        - protocol: TCP
          port: 3306
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
